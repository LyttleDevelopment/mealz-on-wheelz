name: MAIN Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodule contents
        run: |
          ls -la packages
          ls -la packages/design-framework
          ls -la packages/design-framework/packages/ui
          test -f packages/design-framework/tsconfig.base.json
          test -f packages/design-framework/packages/ui/package.json
          test -f packages/design-framework/packages/ui/src/styles/globals.scss

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API Docker image
        run: docker build --network=host -t ghcr.io/lyttledevelopment/mealz-on-weelz:main -f Dockerfile .

      - name: Push API Docker image to GitHub Container Registry
        run: docker push ghcr.io/lyttledevelopment/mealz-on-weelz:main